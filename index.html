<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marine Dashboard Final Full Test v2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       GLOBAL RESET + SHARED DESIGN TOKENS
       ========================================================= */
    * { box-sizing: border-box; }

    :root {
      --gap: 12px;
      --outer-pad: 12px;
      --panel-radius: 22px;
      --panel-border: 1px solid rgba(255,255,255,0.06);
      --panel-shadow: 0 12px 34px rgba(0,0,0,0.34);

      --bg-main: #111528;
      --bg-panel: linear-gradient(180deg, rgba(39,43,74,0.98) 0%, rgba(31,36,64,0.98) 100%);
      --bg-panel-strong: linear-gradient(180deg, rgba(35,40,72,0.98) 0%, rgba(26,31,58,0.98) 100%);
      --bg-panel-soft: linear-gradient(180deg, rgba(46,51,86,0.98) 0%, rgba(34,39,69,0.98) 100%);
      --bg-chart: linear-gradient(180deg, rgba(32,37,67,0.98) 0%, rgba(23,28,51,0.98) 100%);
      --bg-chip: rgba(87,113,255,0.18);

      --text-main: #f3f5fb;
      --text-soft: #b7bdd0;
      --text-muted: #8f96ad;

      --accent-coral: #ff8e7a;
      --accent-coral-soft: rgba(255,142,122,0.20);
      --accent-wind: #dce9ff;
      --accent-gust: rgba(196,206,233,0.58);
      --accent-rain: rgba(120,174,255,0.72);

     --top-row-height: calc((100vh - (2 * var(--outer-pad)) - var(--gap)) / 2);
--wind-width: var(--top-row-height);
--webcam-width: calc(var(--top-row-height) * 16 / 9);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-feature-settings: "tnum" 1, "lnum" 1;
      background: #0d1222;
      color: var(--text-main);
    }

    body {
      background:
        radial-gradient(circle at top right, rgba(47,156,255,0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(92,118,255,0.08), transparent 34%),
        linear-gradient(180deg, #161a31 0%, #111528 100%);
    }

    /* =========================================================
       WHOLE DASHBOARD LAYOUT
       ========================================================= */
    .dashboard {
      width: 100vw;
      height: 100vh;
      padding: var(--outer-pad);
      display: grid;
      grid-template-rows: var(--top-row-height) minmax(0, 1fr);
      gap: var(--gap);
      overflow: hidden;
    }

    .panel {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border-radius: var(--panel-radius);
      background: var(--bg-panel);
      border: var(--panel-border);
      box-shadow: var(--panel-shadow);
    }

    .mode-chip {
      position: absolute;
      top: 8px;
      right: 10px;
      z-index: 6;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--bg-chip);
      border: 1px solid rgba(255,255,255,0.10);
      color: #dfe7fb;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* =========================================================
       TOP ROW
       1. Info panel
       2. Live wind widget panel
       3. Webcam panel
       ========================================================= */
   .top-row {
  display: grid;
  grid-template-columns: minmax(120px, 1fr) var(--wind-width) var(--webcam-width);
  gap: var(--gap);
  min-height: 0;
  height: 100%;
  align-items: stretch;
}
  .top-row > .panel {
  min-width: 0;
}
    .panel-header {
      min-height: var(--header-h);
      padding: 2px 2px 4px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--text-main);
    }

    /* INFO PANEL */
    .info-panel {
      background: linear-gradient(180deg, rgba(34,40,74,0.98) 0%, rgba(24,29,55,0.98) 100%);
      padding: 12px;
      display: grid;
      grid-template-rows: minmax(0, 0.82fr) minmax(0, 0.9fr) minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
      min-width: 0;
    }

    .info-time-block {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 0;
    }

    .info-time {
      font-size: clamp(34px, 3vw, 40px);
      font-weight: 500;
      line-height: 0.95;
      letter-spacing: 0.055em;
      color: var(--text-main);
      text-align: center;
      width: 100%;
    }

    .info-sun-card {
      border-radius: 18px;
      background: var(--bg-panel-soft);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 12px 10px;
      display: grid;
      align-content: center;
      gap: 10px;
      min-width: 0;
    }

    .sun-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: baseline;
    }

    .sun-label {
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 700;
      min-width: 0;
    }

    .sun-value {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--text-main);
      line-height: 1;
      white-space: nowrap;
    }

    .moon-card {
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(35,40,72,0.98) 0%, rgba(27,32,58,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto auto;
      justify-items: center;
      align-content: center;
      text-align: center;
      gap: 0;
      min-height: 0;
      min-width: 0;
    }

    .moon-svg {
      width: 95px;
      height: 95px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.18));
    }

    .moon-name,
    .moon-illumination {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text-main);
      line-height: 1.15;
    }

    .moon-illumination {
      color: #d8ddeb;
      line-height: 1;
    }

    .moon-illumination::before {
      content: "▲ ";
      font-size: 8px;
      position: relative;
      top: -1px;
    }

    /* LIVE WIND PANEL */
    .wind-panel {
      min-width: 0;
      padding: 12px;
      background: linear-gradient(180deg, rgba(34,40,74,0.98) 0%, rgba(24,29,55,0.98) 100%);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      min-height: 0;
    } 

    .wind-shell {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(32,37,67,0.98) 0%, rgba(23,28,51,0.98) 100%);
    }

    .wind-frame {
      position: absolute;
      left: 50%;
      top: 53%;
      width: 122%;
      height: 122%;
      border: 0;
      display: block;
      background: linear-gradient(180deg, rgba(34,40,74,0.98) 0%, rgba(24,29,55,0.98) 100%);
      transform: translate(-50%, -50%) scale(1.04);
      transform-origin: center center;
      pointer-events: none;
    }

    .wind-title {
      padding: 2px 2px 4px;
    }

    /* WEBCAM PANEL */
    .webcam-panel {
  min-width: 0;
  background: #101422;
}

    .webcam-shell {
      position: relative;
      min-height: 0;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      background: #101422;
    }

    .webcam-media {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: #101422;
  border-radius: 18px;
}

   #solent-cam {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .webcam-fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(16,20,34,0.95) 0%, rgba(13,18,30,0.98) 100%),
        radial-gradient(circle at top right, rgba(47,156,255,0.10), transparent 40%);
      color: var(--text-soft);
      z-index: 2;
    }

    .webcam-fallback.show { display: grid; }

    .webcam-fallback-title {
      font-size: 18px;
      font-weight: 700;
      color: #dce2f0;
      margin-bottom: 8px;
    }

    .webcam-fallback-sub {
      font-size: 13px;
      line-height: 1.45;
      color: var(--text-muted);
    }

    /* =========================================================
       BOTTOM ROW
       1. Tide panel
       2. Forecast panel
       ========================================================= */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      min-height: 0;
    }

    .panel-shell {
      padding: 12px;
      background: var(--bg-panel-strong);
      min-height: 0;
    }

    .graph-title {
      min-height: var(--header-h);
      padding: 2px 2px 4px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
    }

    .graph-title-main {
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--text-main);
    }

    .chart-card {
      min-height: 0;
      border-radius: 16px;
      background: var(--bg-chart);
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .mini-card {
      border-radius: 14px;
      background: var(--bg-panel-soft);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 10px 11px 9px;
      display: grid;
      gap: 4px;
      align-content: center;
      min-width: 0;
    }

    .mini-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .mini-main {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.05;
      color: var(--text-main);
      white-space: nowrap;
    }

    .mini-main.inline {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-side {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-soft);
    }

    .side-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .list-card {
      display: grid;
      grid-template-rows: auto auto;
      gap: 6px;
      border-radius: 14px;
      background: var(--bg-panel-soft);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 8px;
      align-self: start;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .list-sub {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* TIDE PANEL */
    .tide-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 124px;
      gap: 8px;
    }

    .tide-main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding-top: 4px;
    }

    .chart-wrap {
      position: absolute;
      inset: 0;
      padding: 14px 12px 6px 10px;
      display: grid;
      grid-template-columns: 44px 1fr;
      grid-template-rows: 1fr auto;
      gap: 2px 8px;
    }

    .y-axis {
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .tide-y-axis {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      align-items: stretch;
      text-align: right;
      padding-top: 18px;
      padding-bottom: 4px;
    }

    .tide-y-axis div,
    .forecast-wind-axis div,
    .forecast-rain-axis div {
      display: flex;
      align-items: center;
      transform: translateY(-50%);
    }

    .tide-y-axis div { justify-content: flex-end; }

    .svg-wrap {
      min-width: 0;
      min-height: 0;
      position: relative;
    }

    .tide-svg,
    .forecast-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .x-axis {
      grid-column: 2;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
      margin-top: -2px;
    }

    .bottom-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .tide-side {
      min-height: 0;
      display: grid;
      grid-template-rows: auto;
      align-content: start;
      padding-top: 18px;
    }

    .event-list {
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .event-row {
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(44,49,84,0.98) 0%, rgba(31,36,64,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 6px 8px 5px;
      display: grid;
      gap: 1px;
    }

    .event-type {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .event-time {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.02;
      color: var(--text-main);
    }

    .event-height {
      font-size: 11px;
      color: var(--text-soft);
      font-weight: 500;
      line-height: 1.05;
    }

    /* FORECAST PANEL
       Notes:
       - top padding slightly increased so title baseline matches tide title
       - weather band lifted slightly so icons / temps are less cramped
       - wind plot given more vertical space than rain plot
       - bottom time axis has its own protected row
    */
    .forecast-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding-top: 12px;
    }

    .forecast-chart-wrap {
      position: absolute;
      inset: 0;
      padding: 14px 12px 10px 10px;
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      grid-template-rows: 56px minmax(132px, 2.3fr) minmax(62px, 1fr) 28px;
      gap: 6px 8px;
    }

    .forecast-weather-band {
      grid-column: 2;
      grid-row: 1;
      display: grid;
      align-items: end;
      padding-bottom: 4px;
    }

    .forecast-weather-grid,
    .forecast-time-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 0;
    }

    .forecast-weather-slot {
      text-align: center;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 5px;
      transform: translateY(-2px);
    }

    .forecast-weather-icon {
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,0.35));
      transform: translateY(-1px);
    }

    .forecast-weather-temp {
      font-size: 15px;
      font-weight: 700;
      color: #ffd9a6;
      line-height: 1;
      transform: translateY(-1px);
    }

    .forecast-wind-axis {
      grid-column: 1;
      grid-row: 2;
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      text-align: right;
      padding-top: 16px;
      padding-bottom: 8px;
      color: #9eb4ff;
      font-size: 12px;
      font-weight: 700;
    }

    .forecast-wind-axis div { justify-content: flex-end; }

    .forecast-rain-axis {
      grid-column: 3;
      grid-row: 3;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      color: #86b7ff;
      font-size: 12px;
      font-weight: 700;
      padding-top: 10px;
      padding-bottom: 6px;
    }

    .forecast-rain-axis div {
      justify-content: flex-start;
      padding-left: 4px;
    }

    .forecast-wind-svg-wrap {
      grid-column: 2;
      grid-row: 2;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .forecast-rain-svg-wrap {
      grid-column: 2;
      grid-row: 3;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .forecast-time-band {
      grid-column: 2;
      grid-row: 4;
      display: grid;
      align-items: end;
      padding-top: 4px;
    }

    .forecast-time-grid {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    @media (max-height: 760px) and (min-width: 700px) {
      .top-row {
        grid-template-columns: minmax(148px, 0.82fr) minmax(250px, 1fr) minmax(360px, 1.56fr);
      }

      .info-panel,
      .wind-panel,
      .webcam-panel,
      .panel-shell {
        padding: 10px;
      }

      .panel-header,
      .graph-title {
        min-height: 30px;
        padding-bottom: 2px;
      }

      .panel-title,
      .graph-title-main {
        font-size: 16px;
      }

      .info-time {
        font-size: clamp(28px, 3vw, 34px);
      }

      .moon-svg {
        width: 74px;
        height: 74px;
      }
    }

    /* RESPONSIVE */
    @media (max-height: 750px) and (min-width: 700px) {
      .moon-card {
        padding: 8px 8px 12px;
        gap: 4px;
      }

      .moon-svg {
        width: 72px;
        height: 72px;
      }

      .moon-name,
      .moon-illumination {
        font-size: 12px;
        line-height: 1.1;
      }
    }

    @media (max-width: 700px) {
      html, body { overflow: auto; }

      .dashboard {
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto auto;
      }

      .top-row,
      .bottom-row {
        grid-template-columns: 1fr;
      }

      .info-panel,
      .wind-panel,
      .webcam-panel,
      .panel-shell {
        min-height: 320px;
      }

      .top-row {
        height: auto;
      }

      .webcam-shell {
        min-height: 260px;
      }

      .tide-panel { grid-template-columns: 1fr; }
      .tide-side { padding-top: 0; }
      .chart-card { min-height: 340px; }
      .bottom-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- ======================================================
         TOP ROW
         ====================================================== -->
    <div class="top-row">
      <!-- 1) INFO / CLOCK / SUN / MOON PANEL -->
      <div class="panel info-panel">
        <div class="info-time-block">
          <div class="info-time" id="info-time">--:--</div>
        </div>

        <div class="info-sun-card">
          <div class="sun-row">
            <span class="sun-label">Sunrise</span>
            <span class="sun-value" id="sunrise-time">--:--</span>
          </div>
          <div class="sun-row">
            <span class="sun-label">Sunset</span>
            <span class="sun-value" id="sunset-time">--:--</span>
          </div>
        </div>

        <div class="moon-card">
          <svg id="moon-icon" viewBox="0 0 100 100" class="moon-svg" aria-label="Moon phase">
            <defs>
              <radialGradient id="moonGlow" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"></stop>
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
              </radialGradient>
            </defs>
            <circle cx="50" cy="50" r="38" fill="url(#moonGlow)"></circle>
            <circle cx="50" cy="50" r="30" fill="#111528" stroke="rgba(255,255,255,0.16)"></circle>
            <path id="moon-shape" d="" fill="#f6f7fb"></path>
          </svg>
          <div class="moon-name" id="moon-name">Waxing Gibbous</div>
          <div class="moon-illumination" id="moon-illumination">76%</div>
        </div>
      </div>

      <!-- 2) LIVE WIND WIDGET PANEL -->
      <div class="panel wind-panel">
        <div class="panel-header wind-title">
          <div class="panel-title">Lymington Starting Platform</div>
        </div>
        <div class="wind-shell">
          <iframe
            id="wind-iframe"
            class="wind-frame"
            src="https://weatherfile.com/widgets/wind-dial/wind-dial.php?locationID=GBR00001&wsunits=kts&locationname=true"
            title="Live wind"
            scrolling="no">
          </iframe>
        </div>
      </div>

      <!-- 3) WEBCAM PANEL -->
    <div class="panel webcam-panel">
  <div class="webcam-media">
          <div class="webcam-media">
          <video id="solent-cam" autoplay muted playsinline></video>
          <div id="webcam-fallback" class="webcam-fallback">
            <div class="webcam-fallback-inner">
              <div class="webcam-fallback-title">Webcam unavailable</div>
              <div class="webcam-fallback-sub">
                The live stream could not be loaded in this browser or is temporarily unavailable.
              </div>
            </div>
          </div>
        </div>
        </div>
      </div>
    </div>

    <!-- ======================================================
         COMPLETE BOTTOM ROW
         ====================================================== -->
    <div class="bottom-row">
      <!-- 4) TIDE PANEL -->
      <div class="panel panel-shell tide-panel">
        <div class="mode-chip">Live API</div>

        <div class="tide-main">

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    /* =========================================================
       SHARED HELPERS
       ========================================================= */
    const WEBCAM_STREAM = "https://camsecure.uk/HLS/royalsolent.m3u8";
    const LYMINGTON = { lat: 50.7592, lon: -1.5383 };
    const FORECAST_URL = "https://api.open-meteo.com/v1/forecast?latitude=50.7592&longitude=-1.5383&hourly=temperature_2m,precipitation_probability,rain,wind_speed_10m,wind_direction_10m,wind_gusts_10m,weather_code&models=ukmo_uk_deterministic_2km,ukmo_seamless&timezone=auto&forecast_days=1&wind_speed_unit=kn";
    const TIDE_API_KEY = "b8a696396eec2787361f6a4e67951fd8";
    const TIDE_SENSOR_ID = 87;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function formatTime(date) {
      return new Date(date).toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatTimeLocal(value) {
      const d = new Date(value);
      return d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
    }

    function hourOnlyLabel(value) {
      const parts = String(value).split(":");
      return (parts[0] || "00").padStart(2, "0");
    }

    /* =========================================================
       TOP ROW LOGIC
       ========================================================= */
    function updateClock() {
      const now = new Date();
      document.getElementById("info-time").textContent = now.toLocaleTimeString("en-GB", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function moonInfoForDate(date = new Date()) {
      const synodicMonth = 29.53058867;
      const knownNewMoon = new Date("2000-01-06T18:14:00Z");
      const days = (date - knownNewMoon) / 86400000;
      const phase = ((days % synodicMonth) + synodicMonth) % synodicMonth;
      const fraction = phase / synodicMonth;
      const illumination = Math.round((1 - Math.cos(2 * Math.PI * fraction)) * 50);

      let name = "New Moon";
      if (fraction < 0.03 || fraction > 0.97) name = "New Moon";
      else if (fraction < 0.22) name = "Waxing Crescent";
      else if (fraction < 0.28) name = "First Quarter";
      else if (fraction < 0.47) name = "Waxing Gibbous";
      else if (fraction < 0.53) name = "Full Moon";
      else if (fraction < 0.72) name = "Waning Gibbous";
      else if (fraction < 0.78) name = "Last Quarter";
      else name = "Waning Crescent";

      return { fraction, illumination, name };
    }

    function drawMoon(fraction) {
      const r = 30, cx = 50, cy = 50;
      const waxing = fraction <= 0.5;
      const phaseAngle = Math.cos(2 * Math.PI * fraction);
      const rx = Math.abs(phaseAngle) * r;
      const d = waxing
        ? `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx} ${cy+r} A ${rx} ${r} 0 1 0 ${cx} ${cy-r} Z`
        : `M ${cx} ${cy-r} A ${rx} ${r} 0 1 1 ${cx} ${cy+r} A ${r} ${r} 0 1 0 ${cx} ${cy-r} Z`;
      document.getElementById("moon-shape").setAttribute("d", d);
    }

    async function refreshAstronomy() {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${LYMINGTON.lat}&longitude=${LYMINGTON.lon}&daily=sunrise,sunset&timezone=Europe%2FLondon`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Astronomy API HTTP ${res.status}`);
        const data = await res.json();
        document.getElementById("sunrise-time").textContent = formatTimeLocal(data.daily.sunrise[0]);
        document.getElementById("sunset-time").textContent = formatTimeLocal(data.daily.sunset[0]);
      } catch (err) {
        console.error("Astronomy refresh failed", err);
      }

      const moon = moonInfoForDate(new Date());
      document.getElementById("moon-name").textContent = moon.name;
      document.getElementById("moon-illumination").textContent = `${moon.illumination}%`;
      drawMoon(moon.fraction);
    }

    function showWebcamFallback() {
      document.getElementById("webcam-fallback").classList.add("show");
    }

    function initWebcam() {
      const video = document.getElementById("solent-cam");

      if (window.Hls && Hls.isSupported()) {
        const hls = new Hls({ maxBufferLength: 30, liveSyncDurationCount: 3 });
        hls.loadSource(WEBCAM_STREAM);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error("HLS error:", data);
          if (data && data.fatal) showWebcamFallback();
        });
        video.addEventListener("error", showWebcamFallback);
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = WEBCAM_STREAM;
        video.addEventListener("loadedmetadata", () => video.play().catch(() => {}));
        video.addEventListener("error", showWebcamFallback);
      } else {
        showWebcamFallback();
      }
    }

    /* =========================================================
       TIDE PANEL DATA + LOGIC
       ========================================================= */
    function generateTodaySampleTide() {
      const now = new Date();
      const dayStart = new Date(now);
      dayStart.setHours(0, 0, 0, 0);

      const points = [];
      const intervalMinutes = 15;
      const totalPoints = (24 * 60) / intervalMinutes + 1;

      const meanLevel = 2.36;
      const mainAmplitude = 1.57;
      const secondaryAmplitude = 0.14;
      const cycleHours = 12.42;

      for (let i = 0; i < totalPoints; i += 1) {
        const time = new Date(dayStart.getTime() + i * intervalMinutes * 60000);
        const hours = i * intervalMinutes / 60;
        const height =
          meanLevel +
          mainAmplitude * Math.sin((2 * Math.PI * hours) / cycleHours - 1.05) +
          secondaryAmplitude * Math.sin((4 * Math.PI * hours) / cycleHours + 0.42);

        points.push({ time, height: Number(Math.max(0.15, height).toFixed(2)) });
      }

      return points;
    }

    function findNearestPoint(points, targetTime) {
      let best = points[0];
      let bestDelta = Math.abs(points[0].time - targetTime);
      points.forEach(point => {
        const delta = Math.abs(point.time - targetTime);
        if (delta < bestDelta) {
          best = point;
          bestDelta = delta;
        }
      });
      return best;
    }

    function findNearestIndex(points, targetTime) {
      let bestIndex = 0;
      let bestDelta = Math.abs(points[0].time - targetTime);
      points.forEach((point, i) => {
        const delta = Math.abs(point.time - targetTime);
        if (delta < bestDelta) {
          bestIndex = i;
          bestDelta = delta;
        }
      });
      return bestIndex;
    }

    function findTurningPoints(points) {
      const turns = [];
      for (let i = 1; i < points.length - 1; i += 1) {
        const prev = points[i - 1].height;
        const curr = points[i].height;
        const next = points[i + 1].height;
        const isHigh = curr > prev && curr >= next;
        const isLow = curr < prev && curr <= next;
        if (isHigh) turns.push({ type: "High", ...points[i] });
        else if (isLow) turns.push({ type: "Low", ...points[i] });
      }

      const deduped = [];
      for (const turn of turns) {
        const last = deduped[deduped.length - 1];
        if (!last) {
          deduped.push(turn);
          continue;
        }
        const minutesApart = Math.abs(turn.time - last.time) / 60000;
        if (turn.type === last.type && minutesApart < 90) {
          if (turn.type === "High" && turn.height > last.height) deduped[deduped.length - 1] = turn;
          if (turn.type === "Low" && turn.height < last.height) deduped[deduped.length - 1] = turn;
        } else {
          deduped.push(turn);
        }
      }
      return deduped.slice(0, 4);
    }

    function buildTideAxes(minH, maxH) {
      const yAxis = document.getElementById("tide-y-axis");
      const xAxis = document.getElementById("tide-x-axis");
      const yTicks = 5;
      const yLabels = [];
      for (let i = 0; i < yTicks; i += 1) {
        const ratio = i / (yTicks - 1);
        const value = maxH - ratio * (maxH - minH);
        yLabels.push(`<div>${value.toFixed(1)}m</div>`);
      }
      yAxis.innerHTML = yLabels.join("");

      const xLabels = [];
      for (let i = 0; i < 7; i += 1) {
        const hour = i * 4;
        xLabels.push(`<div>${String(hour).padStart(2, "0")}:00</div>`);
      }
      xAxis.innerHTML = xLabels.join("");
    }

    function drawTideChart(points) {
      const svgWidth = 1000;
      const plotTop = 36;
      const plotBottom = 350;
      const labelLayer = document.getElementById("tide-label-layer");
      const gridLayer = document.getElementById("tide-grid-layer");

      const minHRaw = Math.min(...points.map(p => p.height));
      const maxHRaw = Math.max(...points.map(p => p.height));
      const padding = 0.2;
      const minH = Math.floor((minHRaw - padding) * 10) / 10;
      const maxH = Math.ceil((maxHRaw + padding) * 10) / 10;

      const startT = points[0].time.getTime();
      const endT = points[points.length - 1].time.getTime();
      const tRange = endT - startT;
      const hRange = maxH - minH;

      const xOf = t => ((t - startT) / tRange) * svgWidth;
      const yOf = h => plotBottom - ((h - minH) / hRange) * (plotBottom - plotTop);

      buildTideAxes(minH, maxH);

      let gridMarkup = "";
      for (let i = 0; i < 5; i += 1) {
        const ratio = i / 4;
        const y = plotTop + ratio * (plotBottom - plotTop);
        gridMarkup += `<line x1="0" y1="${y.toFixed(2)}" x2="${svgWidth}" y2="${y.toFixed(2)}" stroke="${i === 4 ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.06)'}" stroke-width="1"></line>`;
      }
      for (let i = 0; i < 7; i += 1) {
        const x = (i / 6) * svgWidth;
        gridMarkup += `<line x1="${x.toFixed(2)}" y1="${plotTop}" x2="${x.toFixed(2)}" y2="${plotBottom}" stroke="rgba(255,255,255,0.035)" stroke-width="1"></line>`;
      }
      gridLayer.innerHTML = gridMarkup;

      const coords = points.map(p => [xOf(p.time.getTime()), yOf(p.height)]);
      let lineD = "";
      coords.forEach(([x, y], i) => { lineD += `${i === 0 ? "M" : "L"}${x.toFixed(2)},${y.toFixed(2)} `; });
      const fillD = `${lineD}L${coords[coords.length - 1][0].toFixed(2)},${plotBottom} L0,${plotBottom} Z`;
      document.getElementById("tide-line-path").setAttribute("d", lineD.trim());
      document.getElementById("tide-fill-path").setAttribute("d", fillD.trim());

      const now = new Date();
      const current = findNearestPoint(points, now);
      const nowX = xOf(current.time.getTime());
      const nowY = yOf(current.height);
      document.getElementById("tide-now-line").setAttribute("x1", nowX.toFixed(2));
      document.getElementById("tide-now-line").setAttribute("x2", nowX.toFixed(2));
      document.getElementById("tide-now-dot").setAttribute("cx", nowX.toFixed(2));
      document.getElementById("tide-now-dot").setAttribute("cy", nowY.toFixed(2));
      document.getElementById("tide-now-dot-glow").setAttribute("cx", nowX.toFixed(2));
      document.getElementById("tide-now-dot-glow").setAttribute("cy", nowY.toFixed(2));

      const labelWidth = 88;
      const labelHeight = 30;
      const labelX = clamp(nowX - labelWidth / 2, 8, svgWidth - labelWidth - 8);
      const labelY = 4;
      labelLayer.innerHTML = `
        <rect x="${labelX.toFixed(2)}" y="${labelY.toFixed(2)}" width="${labelWidth}" height="${labelHeight}" rx="15" fill="rgba(7,17,28,0.74)" stroke="rgba(255,255,255,0.10)"></rect>
        <text x="${(labelX + labelWidth / 2).toFixed(2)}" y="${(labelY + 19).toFixed(2)}" fill="#f3f5fb" font-size="15" font-weight="500" text-anchor="middle">${current.height.toFixed(2)}m</text>
      `;

      return { current, minHRaw, maxHRaw };
    }

    function populateTideMeta(points, current, minHRaw, maxHRaw) {
      const now = new Date();
      const currentIndex = findNearestIndex(points, now);
      const prev = points[Math.max(0, currentIndex - 1)];
      const next = points[Math.min(points.length - 1, currentIndex + 1)];

      let state = "Steady";
      if (next.height > prev.height) state = "Flooding";
      if (next.height < prev.height) state = "Ebbing";

      const range = maxHRaw - minHRaw;
      const currentPct = range > 0 ? ((current.height - minHRaw) / range) * 100 : 0;
      const pct = Math.round(clamp(currentPct, 0, 100));

      document.getElementById("range-percent").textContent = `${pct}%`;
      document.getElementById("tide-state").textContent = state;
      document.getElementById("range-main").textContent = `${range.toFixed(2)}m`;
    }

    function populateNextTide(turns) {
      const now = new Date();
      const nextTurn = turns.find(turn => turn.time > now) || turns[0];
      document.getElementById("next-tide-type").textContent = nextTurn ? nextTurn.type : "--";
      document.getElementById("next-tide-time").textContent = nextTurn ? formatTime(nextTurn.time) : "--:--";
    }

    function populateTideEvents(turns) {
      const list = document.getElementById("tide-event-list");
      const compactTurns = window.innerHeight < 800 ? turns.slice(0, 3) : turns;
      document.getElementById("tide-events-sub").textContent =
        window.innerHeight < 800 ? `${compactTurns.length} shown` : `${turns.length} tides`;
      list.innerHTML = compactTurns.map(turn => `
        <div class="event-row">
          <div class="event-type">${turn.type}</div>
          <div class="event-time">${formatTime(turn.time)}</div>
          <div class="event-height">${turn.height.toFixed(2)}m</div>
        </div>
      `).join("");
    }

    /* =========================================================
       FORECAST PANEL DATA
       3-hour segmentation logic from 1-hour source data:
       - wind = 3-hour average
       - gust = 3-hour maximum
       - rain = 3-hour total
       - temp = middle hour value
       - weather code = middle hour value
       ========================================================= */
    let forecastData = [];

    const weatherMap = {
      0: { icon: "☀", label: "Clear" },
      1: { icon: "🌤", label: "Mainly clear" },
      2: { icon: "⛅", label: "Partly cloudy" },
      3: { icon: "☁", label: "Cloudy" },
      45: { icon: "🌫", label: "Fog" },
      48: { icon: "🌫", label: "Fog" },
      51: { icon: "🌦", label: "Light drizzle" },
      53: { icon: "🌦", label: "Drizzle" },
      55: { icon: "🌧", label: "Dense drizzle" },
      61: { icon: "🌦", label: "Rain" },
      63: { icon: "🌧", label: "Rain" },
      65: { icon: "🌧", label: "Heavy rain" },
      71: { icon: "🌨", label: "Snow" },
      80: { icon: "🌦", label: "Rain shower" },
      81: { icon: "🌧", label: "Rain shower" },
      82: { icon: "⛈", label: "Heavy shower" },
      95: { icon: "⛈", label: "Thunder" }
    };

    function wx(code) {
      return weatherMap[code] || { icon: "☁", label: "Forecast" };
    }

    function mean(values) {
      return values.reduce((sum, value) => sum + value, 0) / (values.length || 1);
    }

    function sum(values) {
      return values.reduce((sum, value) => sum + value, 0);
    }

    function parseApiDate(value) {
      if (value instanceof Date) return value;

      if (typeof value === "string") {
        if (/^\d{8}#\d{6}$/.test(value)) {
          return new Date(
            `${value.slice(0, 4)}-${value.slice(4, 6)}-${value.slice(6, 8)}T` +
            `${value.slice(9, 11)}:${value.slice(11, 13)}:${value.slice(13, 15)}`
          );
        }

        if (/^\d{14}$/.test(value)) {
          return new Date(
            `${value.slice(0, 4)}-${value.slice(4, 6)}-${value.slice(6, 8)}T` +
            `${value.slice(8, 10)}:${value.slice(10, 12)}:${value.slice(12, 14)}`
          );
        }
      }

      return new Date(value);
    }

    function toCompactDateTime(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return `${y}${m}${d}${hh}${mm}${ss}`;
    }

    function fallbackForecastData() {
      return [
        { time: "00:00", temp: 7,  wind: 3.5, gust: 7.0,  rain: 0.0, code: 3 },
        { time: "03:00", temp: 5,  wind: 3.7, gust: 8.0,  rain: 0.0, code: 3 },
        { time: "06:00", temp: 5,  wind: 5.1, gust: 11.9, rain: 0.0, code: 3 },
        { time: "09:00", temp: 10, wind: 5.9, gust: 11.9, rain: 0.0, code: 3 },
        { time: "12:00", temp: 13, wind: 5.2, gust: 13.0, rain: 0.0, code: 0 },
        { time: "15:00", temp: 12, wind: 4.9, gust: 11.3, rain: 0.0, code: 0 },
        { time: "18:00", temp: 8,  wind: 3.3, gust: 7.4,  rain: 0.0, code: 0 },
        { time: "21:00", temp: 5,  wind: 2.0, gust: 5.1,  rain: 0.0, code: 0 },
        { time: "00:00", temp: 5,  wind: 2.0, gust: 5.1,  rain: 0.0, code: 0 }
      ];
    }

    function segmentForecast(hourlyRows) {
      const segments = [];
      for (let i = 0; i < hourlyRows.length; i += 3) {
        const chunk = hourlyRows.slice(i, i + 3);
        if (!chunk.length) continue;
        const mid = chunk[Math.floor(chunk.length / 2)];
        segments.push({
          time: chunk[0].time.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }),
          temp: Math.round(mid.temp),
          wind: Number(mean(chunk.map(d => d.wind)).toFixed(1)),
          gust: Number(Math.max(...chunk.map(d => d.gust)).toFixed(1)),
          rain: Number(sum(chunk.map(d => d.rain)).toFixed(1)),
          code: mid.code
        });
      }
      if (segments.length) {
        const last = { ...segments[segments.length - 1], time: "00:00" };
        segments.push(last);
      }
      return segments;
    }

    async function loadForecastData() {
      try {
        const res = await fetch(FORECAST_URL);
        if (!res.ok) throw new Error(`Forecast API HTTP ${res.status}`);
        const data = await res.json();
        const hourly = data.hourly || {};
        const rows = (hourly.time || []).map((time, i) => ({
          time: new Date(time),
          temp: Number(hourly.temperature_2m?.[i] ?? 0),
          wind: Number(hourly.wind_speed_10m?.[i] ?? 0),
          gust: Number(hourly.wind_gusts_10m?.[i] ?? hourly.wind_speed_10m?.[i] ?? 0),
          rain: Number(hourly.rain?.[i] ?? 0),
          code: Number(hourly.weather_code?.[i] ?? 3)
        }));
        const today = new Date(rows[0]?.time || Date.now());
        const start = new Date(today); start.setHours(0, 0, 0, 0);
        const end = new Date(start); end.setDate(end.getDate() + 1);
        const todaysRows = rows.filter(row => row.time >= start && row.time < end).slice(0, 24);
        forecastData = segmentForecast(todaysRows.length ? todaysRows : rows.slice(0, 24));
        document.querySelector('.forecast-panel .mode-chip').textContent = 'Live API';
      } catch (err) {
        console.error('Forecast API load failed', err);
        forecastData = fallbackForecastData();
        document.querySelector('.forecast-panel .mode-chip').textContent = 'Fallback';
      }
    }

    function getForecastWindScale() {
      const maxVal = Math.max(...forecastData.map(d => Math.max(d.wind, d.gust)));
      if (maxVal <= 12) return 15;
      if (maxVal <= 18) return 20;
      if (maxVal <= 28) return 30;
      if (maxVal <= 38) return 40;
      return 50;
    }

    function getNowFraction() {
      const now = new Date();
      const minutes = now.getHours() * 60 + now.getMinutes();
      return clamp(minutes / (24 * 60), 0, 1);
    }

    function buildForecastLabels(windTop) {
      document.getElementById("forecast-weather-grid").innerHTML = forecastData.map(d => `
        <div class="forecast-weather-slot" title="${wx(d.code).label}">
          <div class="forecast-weather-icon">${wx(d.code).icon}</div>
          <div class="forecast-weather-temp">${d.temp}°</div>
        </div>
      `).join("");

      document.getElementById("forecast-time-grid").innerHTML = forecastData.map(d => `<div>${hourOnlyLabel(d.time)}</div>`).join("");

      const windTicks =
        windTop === 15 ? [15, 10, 5, 0] :
        windTop === 20 ? [20, 10, 0] :
        windTop === 30 ? [30, 20, 10, 0] :
        windTop === 40 ? [40, 30, 20, 10, 0] :
        [50, 40, 30, 20, 10, 0];
      document.getElementById("forecast-wind-axis").innerHTML = windTicks.map(v => `<div>${v}kn</div>`).join("");

      const maxRain = Math.max(...forecastData.map(d => d.rain));
      const rainTop = Math.max(1, Math.ceil(maxRain));
      document.getElementById("forecast-rain-axis").innerHTML = [rainTop, rainTop / 2, 0].map(v => `<div>${v.toFixed(v === 0 ? 0 : 1)}mm</div>`).join("");
      return rainTop;
    }

    function linePath(points) {
      return points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(" ");
    }

    function drawForecastWind(windTop) {
      const svg = document.getElementById("forecast-wind-svg");
      const W = 1000, H = 250;
      const left = 8, right = 8, top = 28, bottom = 14;
      const plotH = H - top - bottom;
      const n = forecastData.length;
      const x = i => left + i * ((W - left - right) / (n - 1));
      const y = v => top + (1 - clamp(v / windTop, 0, 1)) * plotH;

      let grid = "";
      const tickCount = windTop === 30 ? 3 : windTop === 40 ? 4 : 5;
      for (let i = 0; i <= tickCount; i += 1) {
        const yy = top + (i / tickCount) * plotH;
        grid += `<line x1="0" y1="${yy.toFixed(2)}" x2="1000" y2="${yy.toFixed(2)}" stroke="${i === tickCount ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.06)'}" stroke-width="1"></line>`;
      }
      for (let i = 0; i < n; i += 1) {
        const xx = x(i);
        grid += `<line x1="${xx.toFixed(2)}" y1="0" x2="${xx.toFixed(2)}" y2="${H}" stroke="rgba(255,255,255,0.03)" stroke-width="1"></line>`;
      }

      const windPts = forecastData.map((d, i) => [x(i), y(d.wind)]);
      const gustPts = forecastData.map((d, i) => [x(i), y(d.gust)]);
      const fill = `${linePath(windPts)} L${x(n - 1).toFixed(2)},${(H - bottom).toFixed(2)} L${x(0).toFixed(2)},${(H - bottom).toFixed(2)} Z`;
      const nowX = left + getNowFraction() * (W - left - right);

      svg.innerHTML = `
        <defs>
          <linearGradient id="forecastWindFill" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="rgba(228,238,255,0.18)"></stop>
            <stop offset="100%" stop-color="rgba(228,238,255,0.02)"></stop>
          </linearGradient>
        </defs>
        <g>${grid}</g>
        <line x1="${nowX.toFixed(2)}" y1="0" x2="${nowX.toFixed(2)}" y2="${H}" stroke="var(--accent-coral)" stroke-width="2.2" stroke-dasharray="6 6"></line>
        <path d="${fill}" fill="url(#forecastWindFill)"></path>
        <path d="${linePath(gustPts)}" fill="none" stroke="var(--accent-gust)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="${linePath(windPts)}" fill="none" stroke="var(--accent-wind)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></path>
      `;
    }

    function drawForecastRain(rainTop) {
      const svg = document.getElementById("forecast-rain-svg");
      const W = 1000, H = 120;
      const top = 10, bottom = 20;
      const plotH = H - top - bottom;
      const n = forecastData.length;
      const step = W / n;
      const barW = step * 0.48;
      const y = v => top + (1 - clamp(v / rainTop, 0, 1)) * plotH;

      let grid = "";
      [0, 0.5, 1].forEach((r, i) => {
        const yy = top + r * plotH;
        grid += `<line x1="0" y1="${yy.toFixed(2)}" x2="1000" y2="${yy.toFixed(2)}" stroke="${i === 2 ? 'rgba(120,174,255,0.22)' : 'rgba(255,255,255,0.035)'}" stroke-width="1"></line>`;
      });

      for (let i = 0; i < n; i += 1) {
        const xx = i * step + step / 2;
        const h = Math.max(0, plotH - (y(forecastData[i].rain) - top));
        const bx = xx - barW / 2;
        const by = y(forecastData[i].rain);
        grid += `<rect x="${bx.toFixed(2)}" y="${by.toFixed(2)}" width="${barW.toFixed(2)}" height="${h.toFixed(2)}" rx="8" fill="rgba(120,174,255,0.72)"></rect>`;
      }

      const baseY = top + plotH;
      let axis = `<line x1="0" y1="${baseY.toFixed(2)}" x2="1000" y2="${baseY.toFixed(2)}" stroke="rgba(120,174,255,0.32)" stroke-width="1.4"></line>`;
      for (let i = 0; i < n; i += 1) {
        const xx = i * step + step / 2;
        axis += `<line x1="${xx.toFixed(2)}" y1="${baseY.toFixed(2)}" x2="${xx.toFixed(2)}" y2="${(baseY + 8).toFixed(2)}" stroke="rgba(157,183,255,0.45)" stroke-width="1.2"></line>`;
      }

      const nowX = getNowFraction() * W;
      const hasRain = forecastData.some(d => d.rain > 0);
      svg.innerHTML = `
        ${grid}
        <line x1="${nowX.toFixed(2)}" y1="0" x2="${nowX.toFixed(2)}" y2="${H}" stroke="var(--accent-coral)" stroke-width="2.2" stroke-dasharray="6 6"></line>
        ${axis}
        ${!hasRain ? '<text x="500" y="78" fill="rgba(134,183,255,0.72)" font-size="20" font-weight="700" text-anchor="middle">No rain forecast</text>' : ''}
      `;
    }

    /* =========================================================
       PANEL INITIALISERS
       ========================================================= */
    async function fetchTidePoints() {
      const dayStart = new Date();
      dayStart.setHours(0, 0, 0, 0);

      const dayEnd = new Date(dayStart);
      dayEnd.setDate(dayEnd.getDate() + 1);

      const ts = toCompactDateTime(dayEnd);
      const url = `https://coastalmonitoring.org/observations/tidepredictions/${ts}.geojson?key=${TIDE_API_KEY}&sensor=${encodeURIComponent(TIDE_SENSOR_ID)}&duration=24`;

      const res = await fetch(url, {
        headers: { Accept: "application/json" },
        cache: "no-store"
      });
      if (!res.ok) throw new Error(`Tide API HTTP ${res.status}`);

      const data = await res.json();
      const features = Array.isArray(data?.features) ? data.features : [];
      const points = features.map(feature => {
        const props = feature?.properties || {};
        const timeRaw =
          props.time ?? props.dateTime ?? props.datetime ?? props.timestamp ??
          props.date ?? props.referenceTime ?? props.eventTime ?? props.dt ?? null;
        const heightRaw =
          props.value ?? props.measurement ?? props.level ?? props.tide ??
          props.elevation ?? props.height ?? props.z ?? null;

        if (!timeRaw || heightRaw == null) return null;

        const time = parseApiDate(timeRaw);
        const height = Number(heightRaw);
        if (Number.isNaN(time.getTime()) || !Number.isFinite(height)) return null;

        return { time, height };
      }).filter(Boolean).sort((a, b) => a.time - b.time);

      const todaysPoints = points.filter(p => p.time >= dayStart && p.time <= dayEnd);
      if (!todaysPoints.length) throw new Error("No tide points for today");
      return todaysPoints;
    }

    async function initTidePanel() {
      try {
        const points = await fetchTidePoints();
        const turns = findTurningPoints(points);
        const { current, minHRaw, maxHRaw } = drawTideChart(points);
        populateTideMeta(points, current, minHRaw, maxHRaw);
        populateNextTide(turns);
        populateTideEvents(turns);
        document.querySelector('.tide-panel .mode-chip').textContent = 'Live API';
      } catch (err) {
        console.error('Tide API load failed', err);
        const points = generateTodaySampleTide();
        const turns = findTurningPoints(points);
        const { current, minHRaw, maxHRaw } = drawTideChart(points);
        populateTideMeta(points, current, minHRaw, maxHRaw);
        populateNextTide(turns);
        populateTideEvents(turns);
        document.querySelector('.tide-panel .mode-chip').textContent = 'Fallback';
      }
    }

    async function initForecastPanel() {
      await loadForecastData();
      const windTop = getForecastWindScale();
      const rainTop = buildForecastLabels(windTop);
      drawForecastWind(windTop);
      drawForecastRain(rainTop);
    }

    async function bootDashboard() {
      updateClock();
      refreshAstronomy();
      initWebcam();
      await initTidePanel();
      await initForecastPanel();
    }

    bootDashboard();

    setInterval(updateClock, 30000);
    setInterval(refreshAstronomy, 60 * 60 * 1000);
    setInterval(initTidePanel, 15 * 60 * 1000);
  </script>
</body>
