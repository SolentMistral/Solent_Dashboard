<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
* { box-sizing: border-box; margin:0; }

:root{
  --gap:12px;
  --outer-pad:12px;
  --top-row-height: calc((100vh - (2 * var(--outer-pad)) - var(--gap)) / 2);
  --wind-width: var(--top-row-height);
  --webcam-width: calc(var(--top-row-height) * 16 / 9);
}

body{
  height:100vh;
  background:#111528;
  font-family:Arial;
}

.dashboard{
  height:100%;
  padding:var(--outer-pad);
  display:grid;
  grid-template-rows: var(--top-row-height) 1fr;
  gap:var(--gap);
}

.panel{
  border-radius:18px;
  background:#1c2140;
}

.top-row{
  display:grid;
  grid-template-columns: minmax(120px,1fr) var(--wind-width) var(--webcam-width);
  gap:var(--gap);
}

.top-row > .panel{
  min-width:0;
}

/* INFO */
.info-panel{
  padding:12px;
  color:white;
}

/* WIND */
.wind-panel{
  padding:12px;
  min-width:0;
}

/* WEBCAM FINAL */
.webcam-panel{
  padding:0;
  background:black;
  overflow:hidden;
  border:none;
  box-shadow:none;
  border-radius:18px;
  position:relative;
}

.webcam-media{
  position:absolute;
  inset:0;
  overflow:hidden;
}

#solent-cam{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="top-row">

    <div class="panel info-panel">
      INFO PANEL
    </div>

    <div class="panel wind-panel">
      WIND PANEL
    </div>

    <div class="panel webcam-panel">
      <div class="webcam-media">
        <video id="solent-cam" autoplay muted loop>
          <source src="" type="video/mp4">
        </video>
      </div>
    </div>

  </div>

  <div class="panel">
    BOTTOM CONTENT
  </div>

</div>

</body>
</html>
